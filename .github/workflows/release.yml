# Publishes to PyPI on every v* tag via trusted publishing (no API tokens).
# One-time setup on https://pypi.org/manage/account/publishing/ — add a
# "pending publisher": project `tokenchecker`, owner `ZohaibAhmed`,
# repo `tokenchecker`, workflow `release.yml`, environment `pypi`.
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # keep the floating major tag (used by the composite action's consumers,
  # `uses: ZohaibAhmed/tokenchecker@v0`) pointing at the latest release
  retag-action:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          git tag -f v0
          git push -f origin v0
